<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>9-Player Tournament — Live Scoreboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>🏆 9-Player Tournament</h1>
  <p>3 groups of 3 · round-robin · IPL-style playoffs (Q1 → Q2 → Final)</p>
</header>
<p class="note">📺 Live scoreboard (read-only). Results are updated by the organiser.</p>
<main>
  <section class="section">
    <h2><span class="badge">1</span> Group Stage</h2>
    <div class="grid3" id="groups"></div>
  </section>

  <section class="section">
    <h2><span class="badge">2</span> Seeding <span class="pending" id="seedStatus"></span></h2>
    <div id="seeds"></div>
  </section>

  <section class="section">
    <h2><span class="badge">3</span> Playoffs</h2>
    <div class="playoffs" id="playoffs"></div>
    <div class="champion" id="champion"></div>
  </section>
</main>

<script src="data.js"></script>
<script src="logic.js"></script>
<script>
  renderTournament(window.TOURNAMENT, { editable: false });
</script>
</body>
</html>
